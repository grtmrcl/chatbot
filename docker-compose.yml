services:
  chatbot:
    build: .
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/chatbot/sa_key.json
    volumes:
      - ${HOME}/.config/chatbot/sa_key.json:/root/.config/chatbot/sa_key.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${AMAE_KOROMO_SCRIPTS_DIR}:${AMAE_KOROMO_SCRIPTS_DIR}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      - TZ=Asia/Tokyo
    restart: unless-stopped

  ak-operators:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/chatbot/sa_key.json
    volumes:
      - ${HOME}/.config/chatbot/sa_key.json:/root/.config/chatbot/sa_key.json:ro
    command: ["python", "batch/get_operators.py", "--source", "ak"]

  ef-operators:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/chatbot/sa_key.json
    volumes:
      - ${HOME}/.config/chatbot/sa_key.json:/root/.config/chatbot/sa_key.json:ro
    command: ["python", "batch/get_operators.py", "--source", "ef"]

  operators:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/chatbot/sa_key.json
    volumes:
      - ${HOME}/.config/chatbot/sa_key.json:/root/.config/chatbot/sa_key.json:ro
    command: ["sh", "-c", "python batch/get_operators.py --source ak && python batch/get_operators.py --source ef"]

  ak-events:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/chatbot/sa_key.json
    volumes:
      - ${HOME}/.config/chatbot/sa_key.json:/root/.config/chatbot/sa_key.json:ro
    command: ["python", "batch/get_events.py", "--source", "ak"]

  ef-events:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/chatbot/sa_key.json
    volumes:
      - ${HOME}/.config/chatbot/sa_key.json:/root/.config/chatbot/sa_key.json:ro
    command: ["python", "batch/get_events.py", "--source", "ef"]

  events:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/chatbot/sa_key.json
    volumes:
      - ${HOME}/.config/chatbot/sa_key.json:/root/.config/chatbot/sa_key.json:ro
    command: ["sh", "-c", "python batch/get_events.py --source ak && python batch/get_events.py --source ef"]
