services:
  chatbot:
    build: .
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      - TZ=Asia/Tokyo
    restart: unless-stopped

  ak-operators:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    command: ["python", "batch/get_operators.py", "--source", "ak"]

  ef-operators:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    command: ["python", "batch/get_operators.py", "--source", "ef"]

  operators:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    command: ["sh", "-c", "python batch/get_operators.py --source ak && python batch/get_operators.py --source ef"]

  ak-events:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    command: ["python", "batch/get_events.py", "--source", "ak"]

  ef-events:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    command: ["python", "batch/get_events.py", "--source", "ef"]

  events:
    build: .
    profiles: [batch]
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    command: ["sh", "-c", "python batch/get_events.py --source ak && python batch/get_events.py --source ef"]
