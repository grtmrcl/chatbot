weather:
  templates:
    default: |
      {% for w in data.weather %}{{ w.date }}の{{ data.area_name }}の天気：{{ w.weather }}
      {{ w.hightemp }}℃/{{ w.lowtemp }}℃
      降水確率：{{ w.rain_probability | join('/') }}
      {% endfor %}{% if data.rains %}傘持ってけー{% endif %}

event_reminder:
  templates:
    default: |
      {% for event in data.events %}{% if event.days == 1 %}{{ event.name }}は明日終了します。お忘れなく。{% else %}{{ event.name }}は{{ event.days }}日後に終了します。お忘れなく。{% endif %}
      {% endfor %}

opebirth:
  templates:
    default: |
      {% for name in data.names %}本日は{{ name }}の誕生日です。おめでとうございます！
      {% endfor %}

